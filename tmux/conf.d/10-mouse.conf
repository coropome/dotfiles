# Mouse support defaults on, but stays easy to toggle.

set -g mouse on
bind-key m run-shell 'old=$(tmux show -gv mouse); \
  if [ "$old" = "on" ]; then \
    tmux set -g mouse off && tmux display-message "mouse: OFF"; \
  else \
    tmux set -g mouse on  && tmux display-message "mouse: ON"; \
  fi'

# Select the pane on click, and enter scrollback when the pane is not in an
# alternate-screen app such as vim/less.
bind-key -n MouseDown1Pane select-pane -t= \; send-keys -M
bind-key -n WheelUpPane if-shell -F -t= "#{alternate_on}" "select-pane -t= \; send-keys -M" "select-pane -t= \; copy-mode -e \; send-keys -M"
bind-key -n WheelDownPane select-pane -t= \; send-keys -M
