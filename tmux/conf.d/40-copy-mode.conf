# vi-style copy mode with clipboard integration.

setw -g mode-keys vi
bind-key -T copy-mode-vi Space send -X begin-selection
bind-key -T copy-mode-vi v send -X begin-selection

# Route tmux clipboard integration through the shared platform adapter so
# macOS, Linux, and WSL use the same bootstrap-managed path.
bind-key -T copy-mode-vi y send -X copy-pipe-and-cancel "$HOME/.local/bin/_clipboard_copy"
bind-key -T copy-mode-vi Enter send -X copy-pipe-and-cancel "$HOME/.local/bin/_clipboard_copy"
