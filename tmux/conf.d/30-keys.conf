# Window/pane workflow.

bind-key % split-window -h
bind-key '"' split-window -v
bind-key '|' split-window -h
bind-key '-' split-window -v

bind-key r source-file ~/.config/tmux/tmux.conf \; display-message "tmux.conf reloaded"

bind-key -r Left select-pane -L
bind-key -r Down select-pane -D
bind-key -r Up select-pane -U
bind-key -r Right select-pane -R
bind-key -r h select-pane -L
bind-key -r j select-pane -D
bind-key -r k select-pane -U
bind-key -r l select-pane -R
bind-key Tab select-pane -t :.+

bind-key -r H resize-pane -L 5
bind-key -r J resize-pane -D 5
bind-key -r K resize-pane -U 5
bind-key -r L resize-pane -R 5

bind-key d detach-client
bind-key b choose-buffer
bind-key p paste-buffer

# Help routing stays compatible with older tmux by delegating popup/fallback
# decisions to the installed helper.
bind-key ? run-shell "$HOME/.local/bin/_tmux_help"
bind-key / run-shell "$HOME/.local/bin/_tmux_help full"
