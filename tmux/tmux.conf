# ditfiles tmux.conf
#
# Keep this file as the stable entrypoint that install.sh links into
# ~/.config/tmux/tmux.conf. Ordered fragments below make the config easier
# to review without changing the user-facing workflow.

source-file ~/.config/tmux/conf.d/00-base.conf
source-file ~/.config/tmux/conf.d/10-mouse.conf
source-file ~/.config/tmux/conf.d/20-terminal.conf
source-file ~/.config/tmux/conf.d/30-keys.conf
source-file ~/.config/tmux/conf.d/40-copy-mode.conf
source-file ~/.config/tmux/conf.d/50-status.conf
source-file ~/.config/tmux/conf.d/60-plugins.conf
source-file ~/.config/tmux/conf.d/90-local.conf
source-file ~/.config/tmux/conf.d/99-plugin-bootstrap.conf
