add_newline = false

format = "$directory$git_branch$git_status$fill$cmd_duration$character"

[directory]
style = "yellow"
truncation_length = 3
truncate_to_repo = false

[git_branch]
format = " [$branch]($style)"
style = "dimmed white"

[git_status]
format = "([$all_status$ahead_behind]($style))"
style = "dimmed white"

[fill]
symbol = " "

[cmd_duration]
min_time = 1500
format = " [$duration]($style)"
style = "dimmed white"

[character]
success_symbol = "[>](white)"
error_symbol = "[>](red)"

[hostname]
disabled = true

[username]
disabled = true

[package]
disabled = true
