workflows:
  code:
    default_agent: implementer
    fallback_agents: codex, gemini
    description: Launch the primary implementation agent
  review:
    default_agent: reviewer
    fallback_agents: claude, gemini
    description: Launch the default review agent
  improve:
    default_agent: researcher
    fallback_agents: codex, claude
    description: Explore new tools, prompts, and workflow improvements
  task:
    default_agent: architect
    fallback_agents: implementer
    description: Inspect the current backlog
